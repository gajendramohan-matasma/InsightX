apiVersion: apps/v1
kind: Deployment
metadata:
  name: jd-analytics-frontend
  labels:
    app: jd-analytics-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jd-analytics-frontend
  template:
    metadata:
      labels:
        app: jd-analytics-frontend
    spec:
      containers:
        - name: frontend
          image: jdanalyticsacr.azurecr.io/jd-analytics-frontend:latest
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: jd-analytics-frontend-config
            - secretRef:
                name: jd-analytics-frontend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jd-analytics-frontend
spec:
  selector:
    app: jd-analytics-frontend
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
