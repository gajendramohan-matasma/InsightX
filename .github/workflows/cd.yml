name: CD - Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/insightx-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/insightx-backend

jobs:
  # ── Build & Push Container Images ───────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "version=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL || 'http://localhost:9000' }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ───────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying InsightX to staging"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}"

      # Uncomment and configure for your deployment target:
      # ── Option A: Deploy to Azure AKS ──
      # - name: Azure Login
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      # - name: Set AKS context
      #   uses: azure/aks-set-context@v4
      #   with:
      #     cluster-name: ${{ vars.AKS_CLUSTER }}
      #     resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
      # - name: Deploy to AKS
      #   run: |
      #     kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}
      #     kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}
      #     kubectl rollout status deployment/frontend --timeout=300s
      #     kubectl rollout status deployment/backend --timeout=300s

      # ── Option B: Deploy via Docker Compose on remote server ──
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_SSH_KEY }}
      #     script: |
      #       cd /opt/insightx
      #       docker compose pull
      #       docker compose up -d --remove-orphans
      #       docker compose ps

      - name: Staging health check
        run: |
          echo "✅ Staging deployment complete"
          echo "Run health checks against staging URL here"

  # ── Deploy to Production ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying InsightX to production"
          echo "Image tag: ${{ needs.build-and-push.outputs.image-tag }}"

      # Same deployment steps as staging but targeting production cluster/server

      - name: Production health check
        run: |
          echo "✅ Production deployment complete"
          echo "Run health checks against production URL here"
